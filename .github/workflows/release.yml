name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      libtaijobi: ${{ steps.changes.outputs.libtaijobi }}
      web: ${{ steps.changes.outputs.web }}
      scripts: ${{ steps.changes.outputs.scripts }}
      sync: ${{ steps.changes.outputs.sync }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Detect changed paths
        id: changes
        run: |
          PREV_TAG=$(git tag -l --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            CHANGED=$(git diff --name-only "$PREV_TAG"..HEAD -- . ':(exclude)CHANGELOG.md' ':(exclude)taijobi-web/package.json')
          else
            CHANGED=$(git diff --name-only HEAD~1 -- . ':(exclude)CHANGELOG.md' ':(exclude)taijobi-web/package.json')
          fi
          echo "libtaijobi=$(echo "$CHANGED" | grep -q '^libtaijobi/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "web=$(echo "$CHANGED" | grep -q '^taijobi-web/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "scripts=$(echo "$CHANGED" | grep -q '^scripts/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "sync=$(echo "$CHANGED" | grep -q '^taijobi-sync/' && echo true || echo false)" >> $GITHUB_OUTPUT

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: oven-sh/setup-bun@v2

      - name: Download SQLite amalgamation
        working-directory: libtaijobi/vendor
        run: |
          curl -fsSL https://www.sqlite.org/2026/sqlite-amalgamation-3520000.zip -o sqlite.zip
          unzip -o sqlite.zip
          cp sqlite-amalgamation-3520000/sqlite3.c sqlite3.c
          cp sqlite-amalgamation-3520000/sqlite3.h sqlite3.h

      - name: Build data binaries (CEDICT + decomposition + strokes)
        run: ./scripts/build-all-data.sh

      - name: Zig fmt check
        working-directory: libtaijobi
        run: zig fmt --check src/

      - name: Zig tests
        working-directory: libtaijobi
        run: zig build test

      - name: Install web dependencies
        working-directory: taijobi-web
        run: bun install --frozen-lockfile

      - name: oxfmt check
        working-directory: taijobi-web
        run: bunx oxfmt --check

      - name: oxlint
        working-directory: taijobi-web
        run: bunx oxlint

      - name: svelte-check
        working-directory: taijobi-web
        run: bun run check

  build-and-deploy-web:
    needs: check
    if: needs.check.outputs.web == 'true' || needs.check.outputs.libtaijobi == 'true' || needs.check.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - uses: oven-sh/setup-bun@v2

      - name: Download SQLite amalgamation
        working-directory: libtaijobi/vendor
        run: |
          curl -fsSL https://www.sqlite.org/2026/sqlite-amalgamation-3520000.zip -o sqlite.zip
          unzip -o sqlite.zip
          cp sqlite-amalgamation-3520000/sqlite3.c sqlite3.c
          cp sqlite-amalgamation-3520000/sqlite3.h sqlite3.h

      - name: Build WASM
        run: ./scripts/build-wasm.sh

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: libtaijobi-wasm
          path: taijobi-web/static/libtaijobi.wasm

      - name: Install web dependencies
        working-directory: taijobi-web
        run: bun install --frozen-lockfile

      - name: Build web
        working-directory: taijobi-web
        run: bun run build

      - name: Deploy to Cloudflare Workers
        working-directory: taijobi-web
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-sync:
    needs: check
    if: needs.check.outputs.sync == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install sync worker dependencies
        working-directory: taijobi-sync
        run: bun install --frozen-lockfile

      - name: Deploy sync worker
        working-directory: taijobi-sync
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  release:
    needs: [build-and-deploy-web, deploy-sync]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}

          PREV_TAG=""
          for t in $(git tag -l --sort=-v:refname | tail -n +2); do
            if gh release view "$t" --json tagName >/dev/null 2>&1; then
              PREV_TAG="$t"
              break
            fi
          done

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$PREV_TAG"..HEAD \
              | grep -vE '^- (release|chore|ci|build): ' || echo "- Version bump")
          else
            NOTES=$(git log --pretty=format:"- %s" HEAD~20..HEAD \
              | grep -vE '^- (release|chore|ci|build): ' || echo "- Version bump")
          fi

          echo "$NOTES" > release-notes.md

          # Find the WASM artifact wherever download-artifact placed it
          WASM=$(find artifacts -name 'libtaijobi.wasm' -type f | head -1)
          if [ -z "$WASM" ]; then
            echo "Warning: WASM artifact not found, creating release without it"
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file release-notes.md \
              "$WASM"
          fi

name = "taijobi-sync"
main = "src/index.ts"
compatibility_date = "2025-03-12"
routes = [
  { pattern = "sync.taijobi.com", custom_domain = true }
]

# Bundle the compact MCP WASM into the Worker at build time. Imported as a
# pre-compiled WebAssembly.Module via `import wasmModule from "../libtaijobi-mcp.wasm"`.
rules = [
  { type = "CompiledWasm", globs = ["**/*.wasm"], fallthrough = true }
]

# Hourly cron trigger for push-notification delivery.
# The scheduled() handler in index.ts queries PushSubs for subscriptions
# in the 20–28h "streak in danger" window and sends Web Push to each.
[triggers]
crons = ["0 * * * *"]

# VAPID public key — safe to commit, browsers need it to subscribe.
# The private key lives as a wrangler secret (VAPID_PRIVATE_KEY).
[vars]
VAPID_PUBLIC_KEY = "BNu8V2LOWYFX79QTBv3_HsOR78Ze4wQssEFgLYRKTG9Udf-StfUu7yZEXfZ-eJnzH1vFv1qIl1lulwODgT0UVTI"

[durable_objects]
bindings = [
  { name = "SYNC_ROOM", class_name = "SyncRoom" },
  { name = "MCP_SESSION", class_name = "McpSession" },
  { name = "PUSH_SUBS", class_name = "PushSubs" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoom"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["McpSession"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["PushSubs"]

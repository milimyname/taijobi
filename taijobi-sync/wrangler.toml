name = "taijobi-sync"
main = "src/index.ts"
compatibility_date = "2025-03-12"
routes = [
  { pattern = "sync.taijobi.com", custom_domain = true }
]

# Bundle the compact MCP WASM into the Worker at build time. Imported as a
# pre-compiled WebAssembly.Module via `import wasmModule from "../libtaijobi-mcp.wasm"`.
rules = [
  { type = "CompiledWasm", globs = ["**/*.wasm"], fallthrough = true }
]

[durable_objects]
bindings = [
  { name = "SYNC_ROOM", class_name = "SyncRoom" },
  { name = "MCP_SESSION", class_name = "McpSession" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SyncRoom"]

[[migrations]]
tag = "v2"
# McpSession doesn't actually persist to storage (in-memory WASM + cached key
# only), but the free plan requires every DO class to be declared with the
# SQLite storage backend via new_sqlite_classes. new_classes (the legacy
# KV-style backend) was rejected at deploy time with CF error 10097.
new_sqlite_classes = ["McpSession"]

pre-commit:
  parallel: true
  commands:
    zig-fmt:
      root: libtaijobi/
      glob: "*.zig"
      run: zig fmt --check src/

    web-fmt:
      root: taijobi-web/
      glob: "*.{ts,svelte,js,css,html}"
      run: bunx oxfmt --check

    web-lint:
      root: taijobi-web/
      glob: "*.{ts,svelte,js}"
      run: bunx oxlint

commit-msg:
  commands:
    conventional:
      run: |
        msg=$(head -1 .git/COMMIT_EDITMSG)
        # Allow release commits from release.sh
        if echo "$msg" | grep -qE '^release: v[0-9]+\.[0-9]+\.[0-9]+$'; then
          exit 0
        fi
        # Enforce: type: description (lowercase type, min 10 chars)
        if ! echo "$msg" | grep -qE '^(feat|fix|refactor|chore|docs|style|perf|test|build|ci): .{3,}'; then
          echo ""
          echo "  Bad commit message: $msg"
          echo ""
          echo "  Format: type: description"
          echo "  Types:  feat fix refactor chore docs style perf test build ci"
          echo "  Example: feat: add changelog page"
          echo ""
          exit 1
        fi
